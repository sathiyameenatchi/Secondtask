<!DOCTYPE html>
<html>
<head>
<title>Image Hover Opacity Example</title>
<style>
/* Initial style: image partially transparent */
img {
    width: 300px;
    height: auto;
    opacity: 0.5;               /* 50% transparent initially */
    transition: opacity 0.5s;   /* smooth transition effect */
    display: block;
    margin: 20px auto;
}

/* Hover effect: remove transparency */
img:hover {
    opacity: 1;                 /* fully visible on hover */
}
</style>
</head>
<body>

<h2 style="text-align:center;">Hover over the image to remove transparency</h2>

<!-- Using an online image URL -->
<img src="https://images.unsplash.com/photo-1587613865761-1b0a7c0f92f6?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=60" alt="Sample Image">

</body>
</html>
