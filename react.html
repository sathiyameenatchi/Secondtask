<!DOCTYPE html>
<html>
<head>
    <title>Image Styling Example</title>
    <style>
        /* CSS rule for all images */
        img {
            border-radius: 15px;        /* Rounded corners */
            border: 3px dashed black;   /* Dashed border */
            filter: grayscale(100%);    /* Grayscale effect */
            width: 300px;               /* Optional: size */
            height: auto;
            display: block;
            margin: 20px auto;
        }
    </style>
</head>
<body>

    <h1 style="text-align:center;">Styled Images</h1>

    <img src="https://via.placeholder.com/400x200" alt="Sample Image 1">
    <img src="https://via.placeholder.com/300x300" alt="Sample Image 2">

</body>
</html>
