<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Span Hover Example</title>
<style>
  /* Default span style */
  .hover-span {
    font-size: 16px;
    color: #333;
    font-family: Arial, sans-serif;
    transition: all 0.3s ease; /* Smooth transition */
    cursor: pointer;
  }

  /* Change font size, color, and font family on hover */
  .hover-span:hover {
    font-size: 24px;
    color: #ff5733;
    font-family: "Courier New", monospace;
  }
</style>
</head>
<body>
  <h1>Hover Over the Span Text</h1>

  <p>This is an example: <span class="hover-span">Hover me!</span></p>
  <p>Try moving your mouse over this text: <span class="hover-span">Watch me change!</span></p>
</body>
</html>
