<!DOCTYPE html>
<html>
<head>
    <title>CSS Clip Example</title>
    <style>
        /* parent wrapper for positioning */
        .container {
            position: relative;
            width: 300px;
            height: 300px;
            border: 2px solid #000;
        }

        /* clipped image */
        #myImage {
            position: absolute;
            /* clip: rect(top, right, bottom, left) */
            /* here we clip 100px from right & 100px from bottom */
            clip: rect(0px, 100px, 100px, 0px);
        }
    </style>
</head>
<body>

    <h3>Clipped Image (only top-left visible)</h3>
    <div class="container">
        <img id="myImage" src="https://camo.githubusercontent.com/b1c6591f46ead3b33954e1bcb59357a5e700438513140f84d06b803f87c8b61d/68747470733a2f2f656e637279707465642d74626e302e677374617469632e636f6d2f696d616765733f713d74626e253341414e6439476352315775514c486a616f71464c5142564a54506d71564736576649774b326a447866315241796343514a4a6875686a69743626757371703d434155" alt="GUVI Logo">
    </div>

</body>
</html>
