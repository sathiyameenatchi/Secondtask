<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cursor Types Example</title>
<style>
  body {
    font-family: Arial, sans-serif;
    padding: 20px;
  }

  .cursor-box {
    width: 200px;
    height: 50px;
    margin: 10px 0;
    line-height: 50px;
    text-align: center;
    border: 2px solid #333;
    background-color: #f0f0f0;
    cursor: default; /* default cursor */
  }

  .pointer { cursor: pointer; }
  .crosshair { cursor: crosshair; }
  .text { cursor: text; }
  .wait { cursor: wait; }
  .move { cursor: move; }
  .not-allowed { cursor: not-allowed; }
  .help { cursor: help; }
  .grab { cursor: grab; }
</style>
</head>
<body>
  <h1>Different Cursor Types</h1>

  <div class="cursor-box pointer">Pointer Cursor</div>
  <div class="cursor-box crosshair">Crosshair Cursor</div>
  <div class="cursor-box text">Text Cursor</div>
  <div class="cursor-box wait">Wait Cursor</div>
  <div class="cursor-box move">Move Cursor</div>
  <div class="cursor-box not-allowed">Not-Allowed Cursor</div>
  <div class="cursor-box help">Help Cursor</div>
  <div class="cursor-box grab">Grab Cursor</div>
</body>
</html>
