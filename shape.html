<!DOCTYPE html>
<html>
<head>
<title>Half Rounded Rectangle</title>

<style>
body{
    background:#e6e6e6;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
}

.box{
    width:300px;
    height:150px;
    background:#9cc3c7;
    border-radius:40px 0 40px 0;
}

.text{
    width:300px;
    background:#9e9e9e;
    text-align:center;
    padding:10px;
    color:white;
    margin-top:20px;
}

.text h2{
    margin:0;
    font-weight:normal;
}

.text p{
    margin:0;
    font-size:14px;
}
</style>

</head>

<body>

<div class="box"></div>

<div class="text">
<h2>half-rounded rectangle</h2>
<p>photoshop custom shape</p>
</div>

</body>
</html>
