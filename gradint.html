<!DOCTYPE html>
<html>
<head>
<title>Linear Gradient Div</title>
<style>
.gradient-div {
    width: 300px;
    height: 200px;
    border: 2px solid #000;
    
    /* Linear gradient background */
    background: linear-gradient(to bottom, white, red, blue, green);
    
    text-align: center;
    line-height: 200px; /* vertically center text */
    font-weight: bold;
    color: #fff;
}
</style>
</head>
<body>

<div class="gradient-div">
  Linear Gradient
</div>

</body>
</html>
