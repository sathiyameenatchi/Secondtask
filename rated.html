<!DOCTYPE html>
<html>
<head>
<title>Rotate Div Example</title>
<style>
.rotate-div {
    width: 150px;
    height: 150px;
    background-color: skyblue;
    border: 2px solid #000;
    text-align: center;
    line-height: 150px;
    font-weight: bold;
    
    /* Rotate the div 45 degrees */
    transform: rotate(45deg);
    
    /* Optional: smooth transform (not animated here) */
    transition: transform 0.5s;
}
</style>
</head>
<body>

<div class="rotate-div">
  Rotated
</div>

</body>
</html>
