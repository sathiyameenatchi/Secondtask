<!DOCTYPE html>
<html>
<head>
<title>Bottom Left Rounded Corner</title>
<style>
div {
    width: 300px;
    height: 150px;
    background-color: skyblue;
    padding: 20px;
    
    /* Bottom-left corner radius */
    border-bottom-left-radius: 25px;
    
    /* Optional: border for visibility */
    border: 2px solid #000;
}
</style>
</head>
<body>

<div>
  This div has a rounded bottom-left corner.
</div>

</body>
</html>
