<!DOCTYPE html>
<html>
<head>
<title>Absolute Right Position</title>
<style>
.container {
    position: relative;   /* parent container for reference */
    height: 200px;
    background-color: #f0f0f0;
    border: 2px solid #ccc;
}

/* Div to be positioned to the right */
.right-box {
    position: absolute;   /* absolute positioning */
    right: 0;             /* move to the far right */
    top: 50px;            /* optional vertical position */
    width: 150px;
    height: 100px;
    background-color: skyblue;
    text-align: center;
    line-height: 100px;   /* vertically center text */
    font-weight: bold;
}
</style>
</head>
<body>

<div class="container">
  <div class="right-box">Right Box</div>
</div>

</body>
</html>
