<!DOCTYPE html>
<html>
<head>
<title>Drop Cap Example</title>
<style>
body{
    font-family: "Times New Roman", serif;
    background:#f2f2f2;
    padding:40px;
}

p{
    font-size:28px;
    line-height:1.6;
    width:700px;
}

p::first-letter{
    font-size:110px;
    float:left;
    line-height:0.8;
    padding-right:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<p>
Drop caps can be used to add emphasis to blocks of text but know they can affect readability.
</p>

</body>
</html>
