<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tooltip Example</title>
<style>
  /* Container for tooltip */
  .tooltip {
    position: relative;      /* Needed for absolute positioning of tooltip text */
    display: inline-block;   /* Allows it to fit inline with text */
    cursor: pointer;
    color: #fff;
    background-color: #007BFF;
    padding: 8px 12px;
    border-radius: 5px;
    font-family: Arial, sans-serif;
  }

  /* Tooltip text (hidden by default) */
  .tooltip .tooltiptext {
    visibility: hidden;           /* Hide initially */
    width: 160px;
    background-color: #333;
    color: #fff;
    text-align: center;
    padding: 6px 8px;
    border-radius: 5px;
    position: absolute;
    bottom: 125%;                 /* Position above the element */
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;                   /* Invisible */
    transition: opacity 0.3s;     /* Smooth fade in */
    z-index: 1;
  }

  /* Arrow at bottom of tooltip */
  .tooltip .tooltiptext::after {
    content: "";
    position: absolute;
    top: 100%;                   /* Arrow at bottom */
    left: 50%;
    transform: translateX(-50%);
    border-width: 5px;
    border-style: solid;
    border-color: #333 transparent transparent transparent;
  }

  /* Show tooltip text on hover */
  .tooltip:hover .tooltiptext {
    visibility: visible;
    opacity: 1;
  }
</style>
</head>
<body>
  <h1>CSS Tooltip Example</h1>

  <p>Hover over the button below to see the tooltip:</p>

  <div class="tooltip">
    Hover me!
    <span class="tooltiptext">This is a tooltip message.</span>
  </div>

  <p>Another example:</p>

  <div class="tooltip">
    Info
    <span class="tooltiptext">More information here!</span>
  </div>
</body>
</html>
