<!DOCTYPE html>
<html>
<head>
<title>Flex Reverse Order</title>

<style>

.container{
    display:flex;
    flex-direction:row-reverse;
    background-color:lightgray;
    padding:20px;
}

.container div{
    background-color:skyblue;
    margin:10px;
    padding:20px;
    font-size:20px;
    text-align:center;
}

</style>
</head>

<body>

<div class="container">
  <div>1</div>
  <div>2</div>
  <div>3</div>
</div>

</body>
</html>
