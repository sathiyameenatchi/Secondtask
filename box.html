<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Box Model Example</title>
<style>
  /* Box Model class */
  .box-model {
    width: 200px;           /* content width */
    padding: 20px;          /* space inside border */
    border: 5px solid #333; /* border around padding */
    margin: 15px;           /* space outside border */
    background-color: #f0c040;
    text-align: center;
    font-family: Arial, sans-serif;
  }
</style>
</head>
<body>
  <h1>Box Model Example</h1>

  <div class="box-model">Div 1</div>
  <div class="box-model">Div 2</div>
  <div class="box-model">Div 3</div>

  <p>Each box above has padding, border, and margin, demonstrating the Box Model.</p>
</body>
</html>
